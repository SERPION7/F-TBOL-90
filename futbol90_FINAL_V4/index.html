<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 PRO | SEGURA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #050a0c; --card: rgba(15,25,30,0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; background-size: cover; background-position: center; background-attachment: fixed; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%); z-index: -1; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 20px 100px; }
        header { text-align: center; padding: 40px 0 20px; }
        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -3px; user-select: none; }
        .logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }
        .league-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 25px; scrollbar-width: none; }
        .tab { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; color: #888; white-space: nowrap; cursor: pointer; }
        .tab.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .card { background: var(--card); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; border-left: 6px solid var(--primary); overflow: hidden; }
        .card-header { padding: 15px 20px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 0.75rem; font-weight: 900; color: #aaa; text-transform: uppercase; }
        .prob { font-size: 0.55rem; padding: 4px 8px; border-radius: 5px; font-weight: 900; }
        .prob-ALTA { background: #00ff88; color: #000; }
        .prob-MEDIA { background: #ffd700; color: #000; }
        .prob-BAJA { background: #ff3e3e; color: #fff; }
        .card-body { padding: 20px; }
        .match-name { font-weight: 900; font-size: 0.85rem; margin-bottom: 10px; display: block; }
        .tag { display: inline-block; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 700; color: var(--primary); margin-right: 5px; }
        .card-footer { padding: 15px 20px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .odds { font-size: 1.6rem; font-weight: 900; color: var(--primary); }
        .btn-copy { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 0.75rem; }

        /* Panel Admin Seguro */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 30px; display: none; overflow-y: auto; }
        input, textarea { width: 100%; background: #111; color: #00ff88; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .save-btn { width: 100%; background: var(--primary); color: #000; padding: 15px; border-radius: 12px; font-weight: 900; border: none; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3>MODO ADMIN</h3>
            <button onclick="closeAdmin()" style="background: none; color: white; border: none;">CERRAR</button>
        </div>
        <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">Token GitHub (Solo se pide una vez):</p>
        <input type="password" id="gh-token" placeholder="Pega aquí tu ghp_...">
        <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">Datos de la App (JSON):</p>
        <textarea id="data-editor" style="height: 300px;"></textarea>
        <button class="save-btn" onclick="saveToGitHub()">GUARDAR Y ACTUALIZAR NUBE</button>
        <div id="status-log" style="font-size: 0.7rem; margin-top: 15px; color: #888;"></div>
    </div>

    <div class="container">
        <header><div class="logo" id="main-logo" oncontextmenu="return false;">FÚTBOL <span>90</span></div></header>
        <div class="league-tabs" id="tabs-container"></div>
        <div id="content-area"></div>
    </div>

    <script>
        const GITHUB_REPO = 'SERPION7/F-TBOL-90';
        const GITHUB_FILE = 'futbol90_FINAL_V4/index.html';

        // DATOS INICIALES
        var appData = {
            'EURO': [{ title: "COMBO 5 ESTRELLAS", odds: "38.20", risk: "BAJA", matches: [{ name: "FC BARCELONA vs CA OSASUNA", tags: ["1X2: 1", "AMBOS MARCARÁN: NO"] }, { name: "ARSENAL FC vs FULHAM FC", tags: ["1X2: 1", "GOLES: +1.5"] }] }],
            'ESP': [{ title: "LA LIGA", odds: "6.45", risk: "MEDIA", matches: [{ name: "FC BARCELONA vs CA OSASUNA", tags: ["1X2: 1"] }] }]
        };

        function render(cat, el) {
            if(el) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
            const container = document.getElementById('content-area');
            const items = appData[cat] || [];
            container.innerHTML = items.map(c => `
                <div class="card">
                    <div class="card-header"><span class="card-title">${c.title}</span><span class="prob prob-${c.risk}">PROBABILIDAD: ${c.risk}</span></div>
                    <div class="card-body">
                        ${c.matches.map(m => `<div class="match"><span class="match-name">${m.name}</span><div class="tags">${m.tags.map(t => `<div class="tag">${t}</div>`).join('')}</div></div>`).join('')}
                    </div>
                    <div class="card-footer"><div class="odds">${c.odds}</div><button class="btn-copy">COPIAR</button></div>
                </div>
            `).join('');
        }

        // Detectar pulsación larga (3s) en el logo
        let timer;
        const logo = document.getElementById('main-logo');
        logo.addEventListener('touchstart', () => timer = setTimeout(openAdmin, 3000));
        logo.addEventListener('mousedown', () => timer = setTimeout(openAdmin, 3000));
        logo.addEventListener('touchend', () => clearTimeout(timer));
        logo.addEventListener('mouseup', () => clearTimeout(timer));

        function openAdmin() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('data-editor').value = JSON.stringify(appData, null, 2);
            document.getElementById('admin-panel').style.display = 'block';
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function saveToGitHub() {
            const token = document.getElementById('gh-token').value;
            localStorage.setItem('gh_token', token); // Guardar en el móvil
            const log = document.getElementById('status-log');
            log.innerHTML = "Actualizando...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await res.json();
                let fullCode = decodeURIComponent(escape(atob(fileData.content)));
                const dataStart = fullCode.indexOf('var appData =');
                const dataEnd = fullCode.indexOf('};', dataStart) + 2;
                const updatedCode = fullCode.substring(0, dataStart) + "var appData = " + document.getElementById('data-editor').value + ";" + fullCode.substring(dataEnd);

                const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update via App", content: btoa(unescape(encodeURIComponent(updatedCode))), sha: fileData.sha })
                });

                if(updateRes.ok) { log.innerHTML = "¡ÉXITO! App actualizada."; setTimeout(() => location.reload(), 1500); }
                else { log.innerHTML = "Error: Revisa tu Token."; }
            } catch (e) { log.innerHTML = "Error: " + e.message; }
        }

        window.onload = () => {
            const tabsContainer = document.getElementById('tabs-container');
            const categories = ['EURO', 'ESP', 'ENG', 'GER', 'ITA', 'FRA', 'NED'];
            tabsContainer.innerHTML = categories.map((cat, i) => `<div class="tab ${i===0?'active':''}" onclick="render('${cat}', this)">${cat}</div>`).join('');
            render('EURO');
            const st = ["https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=1920&q=80","https://images.unsplash.com/photo-1543351611-58f69d7c1781?auto=format&fit=crop&w=1920&q=80","https://images.unsplash.com/photo-1596727147705-61a532a659bd?auto=format&fit=crop&w=1920&q=80"];
            document.body.style.backgroundImage = 'url(' + st[Math.floor(Math.random() * st.length)] + ')';
        };
    </script>
</body>
</html>
