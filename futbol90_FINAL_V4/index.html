        .match-analysis { font-size: 0.65rem; color: #aaa; line-height: 1.4; font-style: italic; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border-left: 2px solid #555; }

        function render(cat, el) {
            if(el) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
            const container = document.getElementById('slips-container');
            const items = appData[cat] || [];
            if(items.length === 0) { container.innerHTML = '<p style="text-align:center; padding:40px; color:#666; font-weight:bold;">No hay partidos destacables hoy en esta liga.</p>'; return; }

            container.innerHTML = items.map(c => `
                <div class="bet-slip">
                    <div class="slip-header"><span>${c.title}</span><span class="risk risk-${c.risk}">PROBABILIDAD: ${c.risk}</span></div>
                    <div class="slip-body">
                        ${c.matches.map(m => `
                            <div class="match-box">
                                <div class="match-header">
                                    <span class="match-name"><span class="match-time">${m.time || ''}</span>${m.name}</span>
                                    ${m.confidence ? `<span class="match-conf">${m.confidence}</span>` : ''}
                                </div>
                                <div class="details">
                                    ${m.tags.map(t => `<div class="tag">${t}</div>`).join('')}
                                </div>
                                ${m.analysis ? `<div class="match-analysis">${m.analysis}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="slip-footer"><div><span class="odds-label">CUOTA TOTAL</span><span class="odds">${c.odds}</span></div><button class="btn">COPIAR BOLETO</button></div>
                </div>
            `).join('');
        }

        let timer;
        const logo = document.getElementById('main-logo');
        logo.addEventListener('touchstart', () => timer = setTimeout(openAdmin, 3000));
        logo.addEventListener('mousedown', () => timer = setTimeout(openAdmin, 3000));
        logo.addEventListener('touchend', () => clearTimeout(timer));
        logo.addEventListener('mouseup', () => clearTimeout(timer));

        function openAdmin() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('data-editor').value = JSON.stringify(appData, null, 2);
            document.getElementById('admin-panel').style.display = 'block';
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function saveToGitHub() {
            const token = document.getElementById('gh-token').value;
            localStorage.setItem('gh_token', token);
            const log = document.getElementById('status-log');
            log.innerHTML = "Actualizando la base de datos en la nube...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await res.json();
                let fullCode = decodeURIComponent(escape(atob(fileData.content)));
                const dataStart = fullCode.indexOf('var appData =');
                const dataEnd = fullCode.indexOf('};', dataStart) + 2;
                const updatedCode = fullCode.substring(0, dataStart) + "var appData = " + document.getElementById('data-editor').value + ";" + fullCode.substring(dataEnd);

                const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update Data via Mobile App", content: btoa(unescape(encodeURIComponent(updatedCode))), sha: fileData.sha })
                });

                if(updateRes.ok) { log.innerHTML = "¡ÉXITO! Cierra el panel y refresca la app en 30 segundos."; setTimeout(() => location.reload(), 2000); }
                else { log.innerHTML = "Error de sincronización. Revisa tu Token."; }
            } catch (e) { log.innerHTML = "Error: " + e.message; }
        }

        window.onload = () => {
            const tabsContainer = document.getElementById('tabs-container');
            const categories = ['EURO', 'ESP', 'ENG', 'GER', 'ITA', 'FRA', 'NED'];
            tabsContainer.innerHTML = categories.map((cat, i) => `<div class="tab ${i===0?'active':''}" onclick="render('${cat}', this)">${cat === 'EURO' ? 'EUROPA ★' : cat}</div>`).join('');
            render('EURO');
            const st = ["https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=1920&q=80", "https://images.unsplash.com/photo-1596727147705-61a532a659bd?auto=format&fit=crop&w=1920&q=80"];
            const img = new Image(); img.src = st[Math.floor(Math.random() * st.length)];
            img.onload = () => document.body.style.backgroundImage = 'url(' + img.src + ')';
        };
