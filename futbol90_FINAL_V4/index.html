<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 PRO | MAX DATA</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 15px; margin: 0; background-size: cover; background-position: center; background-attachment: fixed; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; }
        .logo { font-size: 2.2rem; font-weight: 900; text-align: center; padding: 25px 0; color: #00ff88; border-bottom: 1px solid rgba(255,255,255,0.1); user-select: none; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 22px; background: #1a1a1a; border-radius: 20px; font-weight: bold; color: #888; cursor: pointer; white-space: nowrap; transition: 0.3s; border: 1px solid transparent; }
        .tab.active { background: #00ff88; color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        /* Special styles for European cups */
        .tab.tab-ucl { background: #001433; color: #00bfff; border-color: #00bfff; }
        .tab.tab-ucl.active { background: #00bfff; color: #000; box-shadow: 0 0 15px rgba(0,191,255,0.4); }
        .tab.tab-uel { background: #2a1100; color: #ff6600; border-color: #ff6600; }
        .tab.tab-uel.active { background: #ff6600; color: #000; box-shadow: 0 0 15px rgba(255,102,0,0.4); }
        .tab.tab-uecl { background: #002200; color: #00ff00; border-color: #00ff00; }
        .tab.tab-uecl.active { background: #00ff00; color: #000; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        .content { display: none; animation: fadeIn 0.4s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .combo-card { background: linear-gradient(145deg, #111, #1a1a1a); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .combo-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00ff88; }
        .combo-card.card-ucl::before { background: #00bfff; }
        .combo-card.card-uel::before { background: #ff6600; }
        .combo-card.card-uecl::before { background: #00ff00; }
        .combo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; }
        .combo-title { font-size: 1.2rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 8px; }
        .combo-stats { display: flex; gap: 10px; }
        .stat-badge { padding: 5px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .badge-odds { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .badge-risk { background: rgba(255,193,7,0.1); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
        .risk-alta { background: rgba(255,51,102,0.1); color: #ff3366; border-color: rgba(255,51,102,0.3); }
        .risk-baja { background: rgba(0,200,255,0.1); color: #00c8ff; border-color: rgba(0,200,255,0.3); }
        .match-item { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); }
        .match-top { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #aaa; }
        .match-name { font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { background: #222; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; color: #ddd; border: 1px solid rgba(255,255,255,0.1); }
        .tag-pick { background: linear-gradient(90deg, rgba(0,255,136,0.15), transparent); border-left: 2px solid #00ff88; color: #00ff88; }
        .card-ucl .tag-pick { background: linear-gradient(90deg, rgba(0,191,255,0.15), transparent); border-left-color: #00bfff; color: #00bfff; }
        .card-uel .tag-pick { background: linear-gradient(90deg, rgba(255,102,0,0.15), transparent); border-left-color: #ff6600; color: #ff6600; }
        .card-uecl .tag-pick { background: linear-gradient(90deg, rgba(0,255,0,0.15), transparent); border-left-color: #00ff00; color: #00ff00; }
        .analysis-box { background: rgba(255,255,255,0.03); padding: 10px 12px; border-radius: 8px; font-size: 0.85rem; color: #bbb; font-style: italic; border-left: 2px solid #555; }
        .empty-state { text-align: center; padding: 40px 20px; color: #666; font-style: italic; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .confidence-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .confidence-fill { height: 100%; background: #00ff88; border-radius: 2px; }
        .card-ucl .confidence-fill { background: #00bfff; }
        .card-uel .confidence-fill { background: #ff6600; }
        .card-uecl .confidence-fill { background: #00ff00; }
        .future-notice { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 0.9rem; color: #ccc; text-align: center; }
    </style>
</head>
<body>

    <div class="logo">FÚTBOL 90 PRO</div>

    <div class="tabs" id="tabs-container"></div>
    <div id="content-container"></div>

    <script>
        const picksData = {
  "UCL": [
    {
      "title": "CHAMPIONS LEAGUE SEMIFINALS",
      "odds": "-",
      "risk": "MEDIA",
      "isFuture": false,
      "matches": []
    }
  ],
  "UEL": [
    {
      "title": "EUROPA LEAGUE SEMIFINALS (VUELTA)",
      "odds": "4.20",
      "risk": "MEDIA",
      "isFuture": false,
      "matches": [
        {
          "name": "Aston Villa FC vs Nottingham Forest FC",
          "time": "21:00",
          "confidence": "85%",
          "tags": ["1X2: 1", "CÓRNERS: VILLA +6.5"],
          "analysis": "El Villa debe remontar el 0-1 de la ida y dominará el partido asediando al Forest en casa."
        },
        {
          "name": "SC Freiburg vs SC Braga",
          "time": "21:00",
          "confidence": "80%",
          "tags": ["AMBOS MARCARÁN: SÍ", "GOLES: +2.5"],
          "analysis": "El Freiburg tiene que remontar un 1-2, lo que abrirá mucho el partido ante un Braga peligroso."
        }
      ]
    }
  ],
  "UECL": [
    {
      "title": "CONFERENCE LEAGUE SEMIFINALS (VUELTA)",
      "odds": "3.80",
      "risk": "MEDIA",
      "isFuture": false,
      "matches": [
        {
          "name": "RC Strasbourg vs Rayo Vallecano",
          "time": "21:00",
          "confidence": "78%",
          "tags": ["1X2: X2", "TARJETAS: +4.5"],
          "analysis": "Duelo muy disputado donde la intensidad y las faltas marcarán el ritmo del encuentro europeo."
        },
        {
          "name": "Crystal Palace FC vs Shakhtar Donetsk",
          "time": "21:00",
          "confidence": "82%",
          "tags": ["1X2: 1", "GOLES: +1.5"],
          "analysis": "Crystal Palace hace valer su peso en Selhurst Park frente a equipos de menor ritmo competitivo."
        }
      ]
    }
  ],
  "EURO": [
    {
      "title": "COMBO SEMIFINALES EUROPEAS",
      "odds": "12.50",
      "risk": "ALTA",
      "matches": [
        {
          "name": "Aston Villa FC vs Nottingham Forest FC",
          "time": "21:00",
          "confidence": "85%",
          "tags": ["1X2: 1", "CÓRNERS: VILLA +6.5"],
          "analysis": "Monólogo asegurado del Villa buscando igualar la eliminatoria desde el primer minuto."
        },
        {
          "name": "SC Freiburg vs SC Braga",
          "time": "21:00",
          "confidence": "80%",
          "tags": ["AMBOS MARCARÁN: SÍ", "GOLES: +2.5"],
          "analysis": "Choque de ida y vuelta; defensas expuestas por la necesidad del equipo local."
        },
        {
          "name": "RC Strasbourg vs Rayo Vallecano",
          "time": "21:00",
          "confidence": "78%",
          "tags": ["1X2: X2", "TARJETAS: +4.5"],
          "analysis": "El Rayo compite muy bien en estos escenarios de alta tensión y fricción constante."
        },
        {
          "name": "Crystal Palace FC vs Shakhtar Donetsk",
          "time": "21:00",
          "confidence": "82%",
          "tags": ["1X2: 1", "GOLES: +1.5"],
          "analysis": "Superioridad física y táctica del Crystal Palace jugando en su estadio ante su afición."
        }
      ]
    }
  ],
  "ESP": [],
  "ENG": [],
  "GER": [],
  "ITA": [],
  "FRA": [],
  "NED": []
};

        const leagues = { 
            "UCL": "⭐ CHAMPIONS",
            "UEL": "🏆 EUROPA L.",
            "UECL": "🟢 CONFERENCE",
            "EURO": "🇪🇺 EURO COMBO", 
            "ESP": "🇪🇸 ESP", 
            "ENG": "🏴󠁧󠁢󠁥󠁮󠁧󠁿 ENG", 
            "GER": "🇩🇪 GER", 
            "ITA": "🇮🇹 ITA", 
            "FRA": "🇫🇷 FRA", 
            "NED": "🇳🇱 NED" 
        };

        function initApp() {
            const tabsDiv = document.getElementById('tabs-container');
            const contentDiv = document.getElementById('content-container');
            let first = true;

            for (const [key, label] of Object.entries(leagues)) {
                // Create Tab
                const tab = document.createElement('div');
                let tabClass = '';
                if (key === 'UCL') tabClass = 'tab-ucl';
                if (key === 'UEL') tabClass = 'tab-uel';
                if (key === 'UECL') tabClass = 'tab-uecl';
                
                tab.className = `tab ${tabClass} ${first ? 'active' : ''}`;
                tab.innerText = label;
                tab.onclick = (e) => switchTab(key, e, tabClass);
                tabsDiv.appendChild(tab);

                // Create Content Area
                const content = document.createElement('div');
                content.id = `content-${key}`;
                content.className = `content ${first ? 'active' : ''}`;
                contentDiv.appendChild(content);

                renderContent(key, content);
                first = false;
            }
        }

        function renderContent(key, container) {
            const combos = picksData[key];
            
            if (!combos || combos.length === 0 || (combos.length === 1 && combos[0].matches.length === 0)) {
                let msg = "No hay partidos destacados para esta liga hoy.";
                if (key === 'UCL') msg = "No hay partidos de Champions League programados para hoy.";
                if (key === 'UEL') msg = "No hay partidos de Europa League programados para hoy.";
                if (key === 'UECL') msg = "No hay partidos de Conference League programados para hoy.";
                
                container.innerHTML = `<div class="empty-state">${msg}</div>`;
                return;
            }

            let html = '';
            let isUcl = key === 'UCL';
            let isUel = key === 'UEL';
            let isUecl = key === 'UECL';
            let cardClass = isUcl ? 'card-ucl' : (isUel ? 'card-uel' : (isUecl ? 'card-uecl' : ''));

            combos.forEach(combo => {
                let riskClass = combo.risk === 'ALTA' ? 'risk-alta' : combo.risk === 'BAJA' ? 'risk-baja' : '';
                
                if (combo.isFuture) {
                    html += `<div class="future-notice">ℹ️ <b>PREVIA EXCLUSIVA:</b> Estos pronósticos corresponden a la próxima jornada de la competición.</div>`;
                }
                
                html += `
                <div class="combo-card ${cardClass}">
                    <div class="combo-header">
                        <div class="combo-title">🎯 ${combo.title}</div>
                        <div class="combo-stats">
                            <span class="stat-badge badge-odds">@${combo.odds}</span>
                            <span class="stat-badge badge-risk ${riskClass}">${combo.risk}</span>
                        </div>
                    </div>`;

                combo.matches.forEach(match => {
                    let tagsHtml = match.tags.map((t, i) => `<span class="tag ${i===0?'tag-pick':''}">${t}</span>`).join('');
                    
                    html += `
                    <div class="match-item">
                        <div class="match-top">
                            <span>⏱ ${match.time}</span>
                            <span>🔥 ${match.confidence}</span>
                        </div>
                        <div class="match-name">${match.name}</div>
                        <div class="tags">${tagsHtml}</div>
                        <div class="analysis-box">💬 ${match.analysis}</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${match.confidence}"></div>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        function switchTab(key, event, specificClass) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`content-${key}`).classList.add('active');
        }

        initApp();
    </script>
</body>
</html>
