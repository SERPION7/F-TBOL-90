<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 | FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .logo { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 20px; color: #00ff88; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; }
        .tab { background: #1a1a1a; padding: 10px 20px; border-radius: 10px; white-space: nowrap; cursor: pointer; border: 1px solid #333; color: #888; font-weight: bold; }
        .tab.active { background: #00ff88; color: black; border-color: #00ff88; }
        
        .slip-grid { display: block; }
        .bet-slip { background: #111; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; border-left: 5px solid #00ff88; overflow: hidden; }
        .slip-header { padding: 15px; font-weight: 900; background: #1a1a1a; font-size: 0.9rem; }
        .slip-body { padding: 15px; }
        .match-box { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .match-name { font-weight: 900; display: block; margin-bottom: 5px; font-size: 0.8rem; }
        .details { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #222; padding: 5px 8px; border-radius: 5px; font-size: 0.6rem; color: #00ff88; border: 1px solid #333; }
        .slip-footer { padding: 15px; background: #000; display: flex; justify-content: space-between; align-items: center; }
        .odds { font-size: 1.4rem; font-weight: 900; color: #00ff88; }
        .btn { background: #00ff88; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 900; font-size: 0.7rem; }
        
        #error-msg { color: #ff3e3e; text-align: center; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo">FÚTBOL 90</div>

    <div class="tabs">
        <div class="tab active" onclick="changeTab('EURO', this)">COMBOS EUROPA</div>
        <div class="tab" onclick="changeTab('ESP', this)">ESPAÑA</div>
        <div class="tab" onclick="changeTab('ENG', this)">INGLATERRA</div>
    </div>

    <div id="slips-container">
        <p style="text-align: center; color: #555;">Cargando recomendaciones...</p>
    </div>
    
    <div id="error-msg"></div>

    <script>
        // Datos básicos para probar
        var data = {
            'EURO': [
                {
                    title: "COMBO 5 ESTRELLAS",
                    odds: "38.20",
                    matches: [
                        { name: "Barca vs Osasuna", tags: ["1X2: 1", "Remates: Barca"] },
                        { name: "Arsenal vs Fulham", tags: ["1X2: 1", "Goles: +1.5"] },
                        { name: "Ajax vs PSV", tags: ["1X2: X", "Goles: +2.5"] }
                    ]
                }
            ],
            'ESP': [
                {
                    title: "TRIPLETE LA LIGA",
                    odds: "6.45",
                    matches: [
                        { name: "Villarreal vs Levante", tags: ["1X2: 1", "Goles: +2.5"] },
                        { name: "Valencia vs Atleti", tags: ["X2", "Tarjetas: Valencia"] }
                    ]
                }
            ]
        };

        function changeTab(cat, el) {
            var tabs = document.getElementsByClassName('tab');
            for(var i=0; i<tabs.length; i++) { tabs[i].className = 'tab'; }
            el.className = 'tab active';
            render(cat);
        }
