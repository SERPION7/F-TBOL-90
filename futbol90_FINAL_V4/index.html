<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 | ESTADIOS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --secondary: #ff3e3e; --accent: #ffd700; --bg: #050505; --glass: rgba(0,0,0,0.7); --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease-in-out;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent, rgba(0,0,0,0.8));
            z-index: -1;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        header { 
            text-align: center; 
            padding: 40px 0; 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 0 0 30px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .update-tag { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; display: block; }
        
        .section-title { font-size: 1.2rem; margin: 30px 0 15px; color: #fff; font-weight: 800; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .slip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        .bet-slip { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.15); 
            overflow: hidden; 
            border-left: 6px solid var(--primary);
            transition: 0.3s;
        }
        .bet-slip:hover { transform: scale(1.02); border-left-color: var(--accent); }

        .slip-header { background: rgba(255,255,255,0.05); padding: 15px 20px; font-weight: 900; display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--primary); }
        .slip-body { padding: 25px; }
        
        .match-box { margin-bottom: 25px; }
        .match-name { font-weight: 900; font-size: 0.9rem; color: #fff; margin-bottom: 12px; display: block; text-transform: uppercase; }
        
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tag { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); color: #eee; }
        .tag strong { color: var(--primary); margin-left: 4px; }
        
        .slip-footer { background: rgba(255,255,255,0.05); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .odds { font-weight: 900; font-size: 1.8rem; color: var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FÚTBOL <span>90</span></div>
            <span class="update-tag">Modo Dinámico: Estadio Aleatorio</span>
        </header>

        <h2 class="section-title">Análisis de Estadios Pro</h2>
        <div id="slips-container" class="slip-grid"></div>
    </div>

    <script>
        const stadiums = [
            "https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1543351611-58f69d7c1781?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1596727147705-61a532a659bd?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1614632537423-1e6c2e7a0aab?auto=format&fit=crop&w=1920&q=80"
        ];

        document.body.style.backgroundImage = `url(${stadiums[Math.floor(Math.random() * stadiums.length)]})`;

        const recoData = [
            {
                title: "COMBO 5 ESTRELLAS",
                odds: "38.20",
                matches: [
                    { name: "Barca vs Osasuna", tags: ["1X2: 1", "Más Remates: Barca", "Goles: +2.5"] },
                    { name: "Arsenal vs Fulham", tags: ["1X2: 1", "Más Córners: Arsenal", "Ambos Marcan: NO"] },
                    { name: "Atalanta vs Genoa", tags: ["1X2: 1", "Más Tarjetas: Genoa", "Goles: +1.5"] },
                    { name: "Leverkusen vs Leipzig", tags: ["1X2: X2", "Más Remates Puerta: Leipzig", "Ambos Marcan: SÍ"] },
                    { name: "Ajax vs PSV", tags: ["1X2: X", "Goles: +2.5", "Más Remates: PSV"] }
                ]
            }
        ];

        function render() {
            const container = document.getElementById('slips-container');
            container.innerHTML = recoData.map(r => `
                <div class="bet-slip">
                    <div class="slip-header"><span>${r.title}</span><span>ESTADIO PRO</span></div>
                    <div class="slip-body">
                        ${r.matches.map(m => `
                            <div class="match-box">
                                <span class="match-name">${m.name}</span>
                                <div class="details">
                                    ${m.tags.map(t => `<div class="tag">${t}</div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="slip-footer">
                        <div class="odds"><span>${r.odds}</span></div>
                        <button class="btn">COPIAR</button>
                    </div>
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
