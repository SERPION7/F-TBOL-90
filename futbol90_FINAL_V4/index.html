<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 | PRO ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --secondary: #ff3e3e; --accent: #ffd700; --bg: #050505; --glass: rgba(0,0,0,0.75); --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); min-height: 100vh;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 1.2s ease-in-out;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%); z-index: -1;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
        
        header { text-align: center; padding: 40px 0 20px; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -3px; }
        .logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        .tabs { 
            display: flex; gap: 10px; margin: 20px 0 30px; overflow-x: auto; 
            padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; 
            border-radius: 15px; cursor: pointer; white-space: nowrap; font-weight: 700; 
            font-size: 0.85rem; transition: 0.3s; color: #aaa;
        }
        .tab.active { background: var(--primary); color: #000; border-color: var(--primary); transform: translateY(-3px); }

        .section-title { font-size: 1.1rem; margin-bottom: 20px; color: #fff; font-weight: 800; text-transform: uppercase; }
        .slip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 20px; }
        
        .bet-slip { 
            background: var(--glass); backdrop-filter: blur(25px); border-radius: 26px; 
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative;
        }
        
        .risk-badge { 
            position: absolute; top: 15px; right: 20px; font-size: 0.6rem; font-weight: 900; 
            padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px;
