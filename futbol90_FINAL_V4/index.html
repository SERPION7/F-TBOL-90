<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FÚTBOL 90 | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #070e11; --glass: rgba(15, 25, 30, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #ffffff; 
            min-height: 100vh;
            background-image: linear-gradient(135deg, #070e11 0%, #13242a 100%);
            background-size: cover;
            background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--primary); }

        .tabs { 
            display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; 
            padding-bottom: 10px; scrollbar-width: none;
        }
        .tab { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 18px; 
            border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: 700; 
            font-size: 0.8rem; color: #888;
        }
        .tab.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .slip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        
        .bet-slip { 
            background: var(--glass); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative;
        }
        
        .risk { 
            position: absolute; top: 15px; right: 20px; font-size: 0.6rem; font-weight: 900; 
            padding: 3px 8px; border-radius: 5px; text-transform: uppercase;
        }
        .risk-high { background: #ff3e3e; }
        .risk-med { background: #ffd700; color: #000; }
        .risk-low { background: #00ff88; color: #000; }

        .slip-header { padding: 15px 20px; font-weight: 900; font-size: 0.8rem; color: #fff; background: rgba(255,255,255,0.03); }
        .slip-body { padding: 20px; }
        
        .match-box { margin-bottom: 15px; padding-left: 12px; border-left: 2px solid var(--primary); }
        .match-name { font-weight: 800; font-size: 0.85rem; color: #fff; margin-bottom: 8px; display: block; }
        
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .tag { background: rgba(255,255,255,0.03); padding: 6px; border-radius: 6px; font-size: 0.6rem; font-weight: 600; color: #bbb; border: 1px solid rgba(255,255,255,0.05); }
        .tag strong { color: var(--primary); }
        
        .slip-footer { background: rgba(0,0,0,0.2); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .odds { font-weight: 900; font-size: 1.5rem; color: var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <header><div class="logo">FÚTBOL <span>90</span></div></header>

        <div class="tabs">
            <div class="tab active" onclick="changeTab('EURO', this)">Combos Europa</div>
            <div class="tab" onclick="changeTab('ESP', this)">España</div>
            <div class="tab" onclick="changeTab('ENG', this)">Inglaterra</div>
            <div class="tab" onclick="changeTab('GER', this)">Alemania</div>
        </div>

        <div id="slips-container" class="slip-grid">
            <!-- Los boletos aparecerán aquí -->
        </div>
    </div>
